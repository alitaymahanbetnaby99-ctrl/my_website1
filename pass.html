<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QANAT PASS</title>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gold: linear-gradient(135deg, #d4af37 0%, #fcf6ba 45%, #b38728 100%);
            --gold-text: #e5c05b;
        }

        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Golos Text', sans-serif; /* Ең тұрақты шрифт */
            -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000 100%);
            min-height: 100vh; padding-bottom: 140px;
        }

        /* HEADER */
        .header {
            position: sticky; top: 0; z-index: 100; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--glass-border);
        }
        
        .back-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); 
            color: #fff; padding: 10px 18px; border-radius: 12px; 
            font-size: 13px; font-weight: 600; cursor: pointer;
        }

        .main-title {
            font-size: 22px; font-weight: 900; letter-spacing: 1px;
            background: var(--gold); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; text-transform: uppercase;
        }

        .pass-container { padding: 30px 15px; max-width: 500px; margin: 0 auto; }

        /* TITLES (ENGLISH) */
        .pass-titles {
            display: grid; grid-template-columns: 1fr 50px 1fr;
            text-align: center; margin-bottom: 30px;
            font-size: 11px; font-weight: 800; letter-spacing: 2px; color: #555;
        }

        /* TIERS */
        .tier-row {
            display: grid; grid-template-columns: 1fr 50px 1fr;
            gap: 15px; align-items: center; margin-bottom: 25px;
        }

        .reward-card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 20px; display: flex; flex-direction: column; align-items: center;
            min-height: 100px; justify-content: center; position: relative;
        }

        .reward-img { width: 40px; height: 40px; margin-bottom: 10px; }
        .reward-name { font-size: 11px; font-weight: 600; color: #888; text-align: center; }

        .premium-card { border-color: rgba(212, 175, 55, 0.2); }
        .premium-card .reward-name { color: var(--gold-text); }

        .lock-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            z-index: 5; font-size: 18px; color: rgba(255,255,255,0.2);
        }

        .level-num { font-size: 16px; font-weight: 900; color: #333; text-align: center; }

        /* FOOTER BUTTON (GOLD) */
        .footer-buy {
            position: fixed; bottom: 0; width: 100%; padding: 30px 20px;
            background: linear-gradient(to top, #000 80%, transparent); z-index: 200;
        }
        
        .buy-btn {
            width: 100%; height: 60px; border-radius: 16px; border: none;
            background: var(--gold); color: #000; font-weight: 900; font-size: 15px; 
            cursor: pointer; box-shadow: 0 10px 40px rgba(179, 135, 40, 0.25);
            text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="location.href='2index.html'">АРТҚА</button>
        <div class="main-title">QANAT PASS</div>
        <div style="width: 40px;"></div>
    </div>

    <div class="pass-container">
        <div class="pass-titles">
            <div>FREE</div>
            <div style="color:#222">LVL</div>
            <div style="color: var(--gold-text);">PREMIUM</div>
        </div>

        <div id="pass-content">
            </div>
    </div>

    <div class="footer-buy" id="footer-buy">
        <button class="buy-btn" onclick="activatePremium()">БЕЛСЕНДІРУ — 💎 300</button>
    </div>

    <script>
        const rewards = [
            { id: 1, f: "50 XP", fi: "https://i.ibb.co/L9pZ4Xz/xp.png", p: "MEGA CASE", pi: "https://i.ibb.co/N2L8HkS/mega-box.png" },
            { id: 2, f: "КЕЙС", fi: "https://cdn-icons-png.flaticon.com/512/679/679821.png", p: "GOLD SKIN", pi: "https://cdn-icons-png.flaticon.com/512/924/924915.png" },
            { id: 3, f: "100 XP", fi: "https://i.ibb.co/L9pZ4Xz/xp.png", p: "500 XP", pi: "https://i.ibb.co/L9pZ4Xz/xp.png" },
            { id: 4, f: "COIN", fi: "https://cdn-icons-png.flaticon.com/512/2489/2489756.png", p: "100 GEMS", pi: "https://i.ibb.co/hV4S6X4/gems.png" },
            { id: 5, f: "КЕЙС", fi: "https://cdn-icons-png.flaticon.com/512/679/679821.png", p: "PREMIUM CASE", pi: "https://i.ibb.co/N2L8HkS/mega-box.png" },
            { id: 6, f: "200 XP", fi: "https://i.ibb.co/L9pZ4Xz/xp.png", p: "MEGA BOX", pi: "https://i.ibb.co/N2L8HkS/mega-box.png" },
            { id: 7, f: "COIN", fi: "https://cdn-icons-png.flaticon.com/512/2489/2489756.png", p: "200 GEMS", pi: "https://i.ibb.co/hV4S6X4/gems.png" },
            { id: 8, f: "КЕЙС", fi: "https://cdn-icons-png.flaticon.com/512/679/679821.png", p: "VIP SKIN", pi: "https://i.ibb.co/vip-skin.png" },
            { id: 9, f: "300 XP", fi: "https://i.ibb.co/L9pZ4Xz/xp.png", p: "1000 XP", pi: "https://i.ibb.co/L9pZ4Xz/xp.png" },
            { id: 10, f: "ULTRA BOX", fi: "https://i.ibb.co/N2L8HkS/mega-box.png", p: "LEGEND AVATAR", pi: "https://i.ibb.co/vip-skin.png" }
        ];

        function renderPass() {
            const container = document.getElementById('pass-content');
            rewards.forEach(tier => {
                const row = document.createElement('div');
                row.className = 'tier-row';
                row.innerHTML = `
                    <div class="reward-card">
                        <img src="${tier.fi}" class="reward-img">
                        <span class="reward-name">${tier.f}</span>
                    </div>
                    <div class="level-num">${tier.id}</div>
                    <div class="reward-card premium-card">
                        <div class="lock-overlay">🔒</div>
                        <img src="${tier.pi}" class="reward-img">
                        <span class="reward-name">${tier.p}</span>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function activatePremium() {
            if(confirm("Premium-ды 300 кристалға белсендіресіз бе?")) {
                const locks = document.querySelectorAll('.lock-overlay');
                locks.forEach(lock => {
                    lock.style.opacity = '0';
                    setTimeout(() => lock.remove(), 500);
                });
                document.getElementById('footer-buy').innerHTML = 
                    '<div style="text-align:center; font-weight:800; color:var(--gold-text); font-size:12px; letter-spacing:2px;">PREMIUM ACTIVE ✅</div>';
            }
        }

        renderPass();
    </script>
</body>
</html>
