<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz - QANAT IT-Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #111827;
            --card: #1e293b;
            --primary: #38bdf8;
            --green: #22c55e;
            --red: #ef4444;
            --brown: #5d4037;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            padding: 20px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        .header-nav {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            background: var(--brown);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 20px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .back-btn:active { transform: scale(0.95); opacity: 0.8; }
        .quiz-header {
            display: flex;
            flex-wrap: nowrap;        /* Сандар төмен түспейді, бір қатарда тұрады */
            overflow-x: auto;         /* Оңға жылжытуды қосады */
            gap: 8px;
            margin-bottom: 20px;
            padding: 10px 5px;
            width: 100%;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;    /* Скролл сызығын жасыру */
        }

        .quiz-header::-webkit-scrollbar {
            display: none;            /* Chrome/Safari-де скроллды жасыру */
        }

        .q-step {
            flex: 0 0 32px;           /* Сандар қысылып қалмауы үшін өте маңызды */
            width: 36px;
            height: 36px;
            border-radius: 5px;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: 0.2s;
        }
        }

        

        .q-step.active { border-color: var(--primary); color: var(--primary); transform: scale(1.1); }
        .q-step.correct { background: var(--green); color: white; border: none; }
        .q-step.wrong { background: var(--red); color: white; border: none; }

        .quiz-container {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .question-text { font-size: 18px; font-weight: 800; margin-bottom: 20px; line-height: 1.4; }

        .options { display: flex; flex-direction: column; gap: 12px; }

        .option {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }

        .option:active { transform: scale(0.98); }
        .option.selected-correct { border-color: var(--green); background: rgba(34, 197, 94, 0.1); }
        .option.selected-wrong { border-color: var(--red); background: rgba(239, 68, 68, 0.1); }

        .quiz-footer {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Montserrat';
            transition: 0.3s;
        }

        .btn-back { background: #334155; color: white; }
        .btn-next { background: var(--primary); color: #111827; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #result-screen { display: none; text-align: center; }
        
        .circle-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 30px auto;
        }

        .circle-container svg {
            width: 160px;
            height: 160px;
            transform: rotate(-90deg);
        }

        .circle-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 12;
        }

        .circle-progress {
            fill: none;
            stroke: var(--primary);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 1.5s ease-in-out;
        }

        .score-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .score-num { font-size: 44px; font-weight: 900; }

        .back-to-index {
            display: inline-block;
            margin-top: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div id="quiz-screen">
        <a href="index.html" class="back-btn">
    <img src="https://cdn-icons-png.flaticon.com/128/10405/10405645.png" 
         style="width: 16px; height: 16px; margin-right: 6px; vertical-align: middle; filter: invert(1);">
    Артқа
</a>

        <div id="topic-title" style="font-size: 14px; color: var(--primary); font-weight: 800; margin-bottom: 10px; text-align: center;"></div>
        <div class="quiz-header" id="steps-container"></div>

        <div class="quiz-container">
            <div class="question-text" id="question-text">Жүктелуде...</div>
            <div class="options" id="options-container"></div>
        </div>

        <div class="quiz-footer">
            <button class="btn btn-back" onclick="changeQuestion(-1)" id="prev-btn">Артқа</button>
            <button class="btn btn-next" onclick="changeQuestion(1)" id="next-btn">Келесі</button>
        </div>
    </div>

    <div id="result-screen">
        <h2 style="font-weight: 900; margin-top: 40px;">Тест аяқталды!</h2>
        <div class="circle-container">
            <svg>
                <circle class="circle-bg" cx="80" cy="80" r="70"></circle>
                <circle class="circle-progress" id="progress-bar" cx="80" cy="80" r="70"></circle>
            </svg>
            <div class="score-display">
                <div class="score-num" id="final-score">0</div>
                <div style="font-size: 14px; opacity: 0.7; font-weight: 700;">БАЛЛ</div>
            </div>
        </div>
        <p id="result-text" style="font-weight: 700; font-size: 18px; margin-bottom: 30px;"></p>
        <button class="btn btn-next" onclick="location.reload()" style="width: 100%;">Қайта тапсыру</button>
        <br>
        <a href="index.html" class="back-to-index">Бас мәзірге қайту</a>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },

                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                    { q: "Ақпараттың ең кіші өлшем бірлігі?", a: ["Байт", "Бит", "Килобайт", "Метр"], c: 1 },
                ]
            },
            "1.2": {
                name: "10-дықтан 2,8,16 жүйеге айналдыру",
                questions: [
                    { q: "1.2 Тақырыбының 1-сұрағы?", a: ["Жауап 1", "Жауап 2", "Жауап 3", "Жауап 4"], c: 0 }
                ]
            },
            "1.3": { name: "Компьютер құрылғылары", questions: [] },
            "1.4": { name: "Программалық қамтамасыз ету", questions: [] },
            "2.1": { name: "Алгоритмдеу", questions: [] },
            "2.2": { name: "Python-ға кіріспе", questions: [] },
            "2.3": { name: "Деректер типтері", questions: [] },
            "2.4": { name: "Шартты операторлар", questions: [] }
            // Осылай жалғастыра бер...
        };

        // --- 2. ДИНАМИКАЛЫҚ ЖҮКТЕУ ЛОГИКАСЫ ---
        const urlParams = new URLSearchParams(window.location.search);
        const topicKey = urlParams.get('topic') || "1.1"; // Егер URL-де жоқ болса, 1.1 ашылады
        
        const currentLesson = allLessons[topicKey] || allLessons["1.1"];
        let questions = currentLesson.questions;
        document.getElementById('topic-title').innerText = currentLesson.name;

        
        while(questions.length < 20) {
            questions.push({ ...questions[0], q: questions.length + 1 + "-сұрақ: " + questions[0].q });
        }

        let currentIdx = 0;
        let userAnswers = new Array(questions.length).fill(null);

        function initQuiz() {
            const stepsHtml = questions.map((_, i) => `<div class="q-step" id="step-${i}" onclick="jumpTo(${i})">${i + 1}</div>`).join('');
            document.getElementById('steps-container').innerHTML = stepsHtml;
            showQuestion();
        }

        function jumpTo(index) {
            currentIdx = index;
            showQuestion();
        }

        function showQuestion() {
            const qData = questions[currentIdx];
            document.getElementById('question-text').innerHTML = qData.q;
            
            const optionsHtml = qData.a.map((opt, i) => {
                let statusClass = "";
                if (userAnswers[currentIdx] !== null) {
                    if (i === qData.c) statusClass = "selected-correct";
                    else if (i === userAnswers[currentIdx]) statusClass = "selected-wrong";
                }
                return `<div class="option ${statusClass}" onclick="checkAnswer(${i})">${opt}</div>`;
            }).join('');

            document.getElementById('options-container').innerHTML = optionsHtml;
            
            document.querySelectorAll('.q-step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${currentIdx}`).classList.add('active');

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').innerText = currentIdx === questions.length - 1 ? "Аяқтау" : "Келесі";
        }

        // Белсенді нөмірді автоматты түрде ортаға әкеледі
            const activeStep = document.getElementById(`step-${currentIdx}`);
            if (activeStep) {
                activeStep.scrollIntoView({
                    behavior: 'smooth',
                    block: 'nearest',
                    inline: 'center'
                });
            }

        function checkAnswer(optIdx) {
            if (userAnswers[currentIdx] !== null) return;
            userAnswers[currentIdx] = optIdx;
            const correctIdx = questions[currentIdx].c;
            const stepEl = document.getElementById(`step-${currentIdx}`);
            if (optIdx === correctIdx) {
                stepEl.classList.add('correct');
            } else {
                stepEl.classList.add('wrong');
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
                }
            }
            showQuestion();
        }

        function changeQuestion(dir) {
            if (dir === 1 && currentIdx === questions.length - 1) {
                finishQuiz();
                return;
            }
            currentIdx += dir;
            showQuestion();
        }

        function finishQuiz() {
            const score = userAnswers.filter((ans, i) => ans === questions[i].c).length;
            const total = questions.length;
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            
            const progressBar = document.getElementById('progress-bar');
            const circumference = 440;
            const offset = circumference - (score / total) * circumference;
            
            setTimeout(() => {
                progressBar.style.strokeDashoffset = offset;
            }, 100);

            let msg = score > 15 ? "Керемет! Сен нағыз IT маманысың!" : "Жақсы, бірақ әлі де іздену керек.";
            document.getElementById('result-text').innerText = msg;
        }

        initQuiz();
    </script>
</body>
</html>
