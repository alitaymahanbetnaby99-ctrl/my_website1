<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QANAT IT-Robot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --accent: #818cf8;
            --gold: #fbbf24;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Бүкіл экран секірмеуі үшін */
        }

        /* Top Bar - Қатып тұрады */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--primary);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            box-sizing: border-box;
        }

        .profile-btn {
            background: var(--card);
            border: 1px solid var(--primary);
            color: white;
            padding: 6px 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .xp-badge {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            padding: 6px 15px;
            border-radius: 12px;
            font-weight: 800;
        }

        /* Pages - Ортаңғы бөлім айналады (Scroll) */
        .page {
            display: none;
            height: 100vh;
            padding: 80px 20px 100px 20px; /* Top-bar мен Bottom-nav үшін орын */
            overflow-y: auto; /* Скролл осында */
            box-sizing: border-box;
            text-align: center;
            -webkit-overflow-scrolling: touch;
        }

        .active { display: flex; flex-direction: column; align-items: center; }

        /* Robot & UI */
        .robot-img {
            width: 220px; /* Өлшемі реттелген */
            height: auto;
            margin: 20px 0;
            filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.4));
        }

        .title-name {
            font-size: 32px;
            color: var(--primary);
            margin: 0;
            font-weight: 900;
        }

        .action-btn {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border: none;
            padding: 15px;
            width: 90%;
            border-radius: 18px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3);
            cursor: pointer;
        }

        .pass-card {
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            width: 90%;
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }

        /* Bottom Nav - Қатып тұрады */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #334155;
            z-index: 100;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #94a3b8;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        .nav-btn img {
            width: 28px;
            height: 28px;
            margin-bottom: 5px;
            opacity: 0.6;
        }

        .active-nav { color: var(--primary); }
        .active-nav img { opacity: 1; filter: drop-shadow(0 0 5px var(--primary)); }

        /* Modal Profile */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .modal-card {
            background: var(--card);
            width: 85%;
            padding: 30px;
            border-radius: 25px;
            border: 2px solid var(--primary);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="profile-btn" onclick="openProfile()">👤 Профиль</div>
        <div class="xp-badge">⚡ <span id="xp-count">0</span> XP</div>
    </div>

    <div id="page-main" class="page active">
        <img src="robot.webp" class="robot-img" alt="QANAT">
        <h1 class="title-name">QANAT</h1>
        <p style="color: #94a3b8; margin-bottom: 20px;">Денгей: 1</p>
        
        <button class="action-btn" onclick="tg.showAlert('📦 Кейстер жақында қосылады!')">📦 КЕЙС АШУ</button>
        
        <div class="pass-card">
            <h3 style="margin: 0; color: var(--gold);">🏆 QANAT PASS</h3>
            <p style="font-size: 14px; color: #cbd5e1;">Тапсырмаларды орындап, эксклюзивті киімдер ал!</p>
            <div style="background: #0f172a; height: 8px; border-radius: 4px; margin-top: 10px;">
                <div style="background: var(--gold); width: 30%; height: 100%; border-radius: 4px;"></div>
            </div>
        </div>

        <div style="height: 50px;"></div> </div>

    <div id="page-quiz" class="page">
        <h2>⚡ УБТ КУИЗ</h2>
        <div class="pass-card" style="text-align: center;">
            <p>Информатика және Математика сұрақтары дайындалуда...</p>
            <button class="action-btn" onclick="addXP(20)">Тест бастау (+20 XP)</button>
        </div>
    </div>

    <div id="page-wardrobe" class="page">
        <h2>👕 ГАРДЕРОБ</h2>
        <p>Киімдер жинағы жақында ашылады.</p>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-card">
            <div style="font-size: 50px; margin-bottom: 10px;">👨‍💻</div>
            <h2 id="u-name" style="margin: 0;">Маман</h2>
            <hr style="border: 0.5px solid #334155; margin: 20px 0;">
            <p>🏅 Лига: <b style="color: var(--gold);">БРОНЗА</b></p>
            <p>📏 Бойы: <b>190 см</b></p>
            <p>⚡ Жалпы XP: <b id="m-xp">0</b></p>
            <button class="action-btn" onclick="closeProfile()">Жабу</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn active-nav" onclick="nav('main', this)">
            <img src="home.webp" alt="Басты">
            <span>Басты</span>
        </div>
        <div class="nav-btn" onclick="nav('quiz', this)">
            <img src="home.webp" style="filter: hue-rotate(180deg);" alt="Куиз">
            <span>Куиз</span>
        </div>
        <div class="nav-btn" onclick="nav('wardrobe', this)">
            <img src="home.webp" style="filter: grayscale(1);" alt="Гардероб">
            <span>Гардероб</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let xp = localStorage.getItem('xp') ? parseInt(localStorage.getItem('xp')) : 0;
        updateXPDisplay();

        // Телеграмнан атын алу
        if (tg.initDataUnsafe.user) {
            document.getElementById('u-name').innerText = tg.initDataUnsafe.user.first_name;
        }

        function nav(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            el.classList.add('active-nav');
            
            tg.HapticFeedback.impactOccurred('medium');
        }

        function addXP(amount) {
            xp += amount;
            updateXPDisplay();
            localStorage.setItem('xp', xp);
            tg.HapticFeedback.notificationOccurred('success');
        }

        function updateXPDisplay() {
            document.getElementById('xp-count').innerText = xp;
            document.getElementById('m-xp').innerText = xp;
        }

        function openProfile() {
            document.getElementById('profile-modal').style.display = 'flex';
            tg.HapticFeedback.impactOccurred('light');
        }

        function closeProfile() {
            document.getElementById('profile-modal').style.display = 'none';
        }

        // Роботты шерткенде XP қосу
        document.querySelector('.robot-img').onclick = () => addXP(5);
    </script>
</body>
</html>
