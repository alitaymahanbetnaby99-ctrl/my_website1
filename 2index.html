<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IT-Robot Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --gold: #fbbf24;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Жоғарғы статус бар - Дұрысталған */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--card);
            border-bottom: 2px solid var(--primary);
        }

        .profile-btn {
            background: #334155;
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid var(--primary);
        }

        .xp-badge {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 800;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
        }

        /* Басты беттегі Робот */
        .robot-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 30px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #robot-img {
            width: 100%;
            height: auto;
            z-index: 1;
        }

        /* Бөлімдер (Pages) */
        .page { display: none; padding: 20px; text-align: center; height: 80vh; }
        .active { display: block; }

        h2 { font-size: 28px; margin-bottom: 10px; } /* Текстті үлкейттік */

        /* Астыңғы меню батырмалары */
        .bottom-nav {
            position: fixed;
            bottom: 0; width: 100%;
            height: 80px;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #334155;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #94a3b8;
            cursor: pointer;
            font-size: 16px; /* Текст өлшемі орташа */
            font-weight: 600;
        }

        .nav-btn.active-nav { color: var(--primary); transform: scale(1.1); }

        /* Гардеробтағы суреттер тізімі */
        .items-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .item-card {
            background: var(--card);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid #334155;
        }

        .item-card img { width: 60px; height: 60px; display: block; margin: 0 auto 10px; }
        
        .action-btn {
            background: var(--primary);
            border: none; color: white;
            padding: 12px; border-radius: 10px;
            width: 100%; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="profile-btn" onclick="openProfile()">👤 Профиль</div>
        <div class="xp-badge">⚡ <span id="xp-display">0</span> XP</div>
    </div>

    <div id="page-main" class="page active">
        <div class="robot-container">
            <img id="robot-img" src="robot_default.png" alt="Robot">
        </div>
        <h2 id="user-greeting">IT-Robot</h2>
        <p style="color: var(--primary); font-size: 18px;">Лига: Бронза</p>
    </div>

    <div id="page-quiz" class="page">
        <h2>⚡ КУИЗ ОЙНАУ</h2>
        <div style="background: var(--card); padding: 30px; border-radius: 20px; margin-top: 20px;">
            <p id="q-text" style="font-size: 20px;">Сұрақ жүктелуде...</p>
            <button class="action-btn" onclick="addXP(50)">Жауап беру</button>
        </div>
    </div>

    <div id="page-wardrobe" class="page">
        <h2>👕 ГАРДЕРОБ</h2>
        <div class="items-grid">
            <div class="item-card">
                <img src="skin1.png" alt="Skin 1">
                <button class="action-btn" onclick="changeSkin('skin1.png')">Кию</button>
            </div>
            <div class="item-card">
                <img src="skin2.png" alt="Skin 2">
                <button class="action-btn" onclick="changeSkin('skin2.png')">Кию</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn active-nav" onclick="showPage('main', this)">
            <span style="font-size: 24px;">🏠</span>
            <span>Басты</span>
        </div>
        <div class="nav-btn" onclick="showPage('quiz', this)">
            <span style="font-size: 24px;">⚡</span>
            <span>Куиз</span>
        </div>
        <div class="nav-btn" onclick="showPage('wardrobe', this)">
            <span style="font-size: 24px;">👕</span>
            <span>Гардероб</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let xp = 0;

        function showPage(pageId, el) {
            // Беттерді ауыстыру
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            
            // Менюді бояу
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            el.classList.add('active-nav');
            
            tg.HapticFeedback.impactOccurred('medium');
        }

        function addXP(amount) {
            xp += amount;
            document.getElementById('xp-display').innerText = xp;
            tg.HapticFeedback.notificationOccurred('success');
        }

        function changeSkin(imgName) {
            // Роботтың суретін ауыстыру
            document.getElementById('robot-img').src = imgName;
            tg.showPopup({ message: "Киім ауыстырылды! ✅" });
        }

        function openProfile() {
            tg.showPopup({
                title: 'Менің Профилім',
                message: `Аты: ${tg.initDataUnsafe.user?.first_name || 'IT-Маман'}\nID: ${tg.initDataUnsafe.user?.id || '0000'}\nБойы: 190 см`,
                buttons: [{type: 'ok', text: 'Жабу'}]
            });
        }
    </script>
</body>
</html>
