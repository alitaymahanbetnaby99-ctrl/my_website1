<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finish Academy - IT Robot</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --tg-theme-bg: #1a1a1a;
            --primary-color: #4facfe;
            --gold: #ffd700;
            --bronze: #cd7f32;
        }

        body {
            background-color: var(--tg-theme-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Статус-бар */
        .header {
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            background: #252525;
            box-sizing: border-box;
            border-bottom: 2px solid var(--primary-color);
        }

        .league-badge {
            background: linear-gradient(45deg, var(--bronze), var(--gold));
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* Робот контейнері */
        .main-stage {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .robot-mascot {
            width: 180px;
            height: 220px;
            background: #333;
            border-radius: 40px;
            border: 4px solid var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            box-shadow: 0 0 25px rgba(79, 172, 254, 0.4);
            transition: all 0.3s ease;
            position: relative;
        }

        /* Төменгі мәзір */
        .controls {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 20px;
            box-sizing: border-box;
            background: #222;
        }

        .btn {
            border: none;
            padding: 18px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.95); }
        .btn-quiz { background: var(--primary-color); }
        .btn-case { background: #9400d3; }
        .btn-wardrobe { background: #444; }
        .btn-rank { background: #ffaa00; }

        #xp-text { font-size: 20px; margin-top: 15px; color: var(--primary-color); }
    </style>
</head>
<body>

    <div class="header">
        <div id="league-name" class="league-badge">БРОНЗА</div>
        <div style="font-weight: bold;">⚡ XP: <span id="xp-count">0</span></div>
    </div>

    <div class="main-stage">
        <div class="robot-mascot" id="robot-visual">🤖</div>
        <div id="xp-text">Деңгей: 1</div>
    </div>

    <div class="controls">
        <button class="btn btn-quiz" onclick="playQuiz()">⚡ КУИЗ</button>
        <button class="btn btn-case" onclick="openCase()">📦 КЕЙС</button>
        <button class="btn btn-wardrobe" onclick="openWardrobe()">👕 ГАРДЕРОБ</button>
        <button class="btn btn-rank" onclick="showRank()">🏆 РЕЙТИНГ</button>
    </div>

    <script>
        // Telegram Web App бастау
        const tg = window.Telegram.WebApp;
        tg.expand(); // Экранды толық жаю
        tg.ready();

        let xp = 0;
        const leagues = ["БРОНЗА", "КҮМІС", "АЛТЫН", "АЛМАС", "ТИТАН", "МАСТЕР", "КИБЕР", "ЛЕГЕНДА"];

        function playQuiz() {
            // Қарапайым логика: әр басқанда 100 XP
            xp += 100;
            updateStats();
            
            // Telegram-ның дірілдету (Vibration) эффектісі
            tg.HapticFeedback.impactOccurred('medium');
        }

        function updateStats() {
            document.getElementById('xp-count').innerText = xp;
            
            // Лиганы есептеу
            let lIdx = Math.floor(xp / 500);
            if (lIdx >= leagues.length) lIdx = leagues.length - 1;
            
            const lName = document.getElementById('league-name');
            lName.innerText = leagues[lIdx];

            // Роботтың деңгейіне қарай эффект қосу
            if(xp >= 500) {
                document.getElementById('robot-visual').style.borderColor = "#ffd700";
                document.getElementById('robot-visual').style.boxShadow = "0 0 30px #ffd700";
            }
        }

        function openCase() {
            tg.showPopup({
                title: 'Кейс ашылуда!',
                message: 'Саған "2x XP" бустері түсті! 🎉',
                buttons: [{type: 'ok', text: 'Керемет!'}]
            });
        }

        function openWardrobe() {
            tg.showAlert("Гардероб жақында ашылады! Роботыңа киім дайындап жатырмыз.");
        }

        function showRank() {
            tg.showAlert("Сен әзірше өз лигаңда TOP-10 тізіміндесің!");
        }

    </script>
</body>
</html>
