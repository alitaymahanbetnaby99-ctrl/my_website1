<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IT-Robot App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --accent: #f59e0b;
            --nav-bg: #1e293b;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Беттер стилі */
        .page {
            display: none;
            height: calc(100vh - 70px); /* Астыңғы менюге орын қалдыру */
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            text-align: center;
        }

        .active-page { display: flex; flex-direction: column; align-items: center; }

        /* Жоғарғы статус */
        .status-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: var(--card-bg);
            border-bottom: 1px solid #334155;
        }

        /* Робот */
        .robot-box {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #334155 0%, #0f172a 100%);
            border-radius: 50%;
            border: 4px solid var(--primary);
            margin: 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
        }

        /* Астыңғы меню (Bottom Navigation) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #334155;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #94a3b8;
            font-size: 10px;
            text-decoration: none;
            cursor: pointer;
        }

        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }

        /* Батырмалар стилі */
        .action-btn {
            background: var(--primary);
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            margin: 10px;
            width: 80%;
        }

        .quiz-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            width: 90%;
        }
    </style>
</head>
<body>

    <div class="status-header">
        <span style="color: var(--accent); font-weight: bold;">💎 АЛТЫН ЛИГА</span>
        <span>⚡ XP: <span id="xp-val">0</span></span>
    </div>

    <div id="main" class="page active-page">
        <div class="robot-box" id="robot-main">🤖</div>
        <h2>Сәлем, IT-Маман!</h2>
        <p>Деңгей: 1</p>
        <button class="action-btn" onclick="openCase()">📦 КЕЙС АШУ</button>
    </div>

    <div id="quiz" class="page">
        <div class="quiz-card">
            <h3 id="question">Информатика сұрағы осында шығады...</h3>
            <div id="options">
                <button class="action-btn" style="background:#334155" onclick="checkAns(true)">А) Жауап 1</button>
                <button class="action-btn" style="background:#334155" onclick="checkAns(false)">Б) Жауап 2</button>
            </div>
        </div>
    </div>

    <div id="wardrobe" class="page">
        <h2>👕 Гардероб</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="action-btn" style="background:#444" onclick="changeSkin('🕶️')">Көзілдірік</button>
            <button class="action-btn" style="background:#444" onclick="changeSkin('👑')">Тәж</button>
            <button class="action-btn" style="background:#444" onclick="changeSkin('🎧')">Наушник</button>
            <button class="action-btn" style="background:#444" onclick="changeSkin('🤖')">Бастапқы</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('main', this)">
            <span>🏠</span>
            <span>Басты</span>
        </div>
        <div class="nav-item" onclick="nav('quiz', this)">
            <span>⚡</span>
            <span>Куиз</span>
        </div>
        <div class="nav-item" onclick="nav('wardrobe', this)">
            <span>👕</span>
            <span>Гардероб</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let xp = 0;

        function nav(pageId, el) {
            // Барлық бетті жасыру
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            // Керекті бетті көрсету
            document.getElementById(pageId).classList.add('active-page');
            el.classList.add('active');
            
            tg.HapticFeedback.impactOccurred('light');
        }

        function changeSkin(emoji) {
            document.getElementById('robot-main').innerText = emoji;
            tg.HapticFeedback.notificationOccurred('success');
        }

        function checkAns(isCorrect) {
            if(isCorrect) {
                xp += 50;
                document.getElementById('xp-val').innerText = xp;
                tg.showAlert("Дұрыс! +50 XP");
            }
            tg.HapticFeedback.impactOccurred('medium');
        }

        function openCase() {
            tg.showPopup({
                title: '📦 Кейс',
                message: 'Саған жаңа "Кибер-көзілдірік" түсті!',
                buttons: [{type: 'ok'}]
            });
        }
    </script>
</body>
</html>
