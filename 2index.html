<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QANAT IT-Robot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --accent: #818cf8;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--primary);
        }

        .profile-btn {
            background: var(--card);
            border: 1px solid var(--primary);
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .xp-display {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 800;
        }

        /* Pages */
        .page { display: none; height: 80vh; padding: 20px; text-align: center; }
        .active { display: flex; flex-direction: column; align-items: center; }

        /* Main Robot Image */
        .robot-img {
            width: 280px;
            height: auto;
            margin: 20px 0;
            filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.4));
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0; width: 100%; height: 85px;
            background: var(--card);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #334155;
        }

        .nav-btn {
            display: flex; flex-direction: column; align-items: center;
            color: #94a3b8; font-size: 14px; font-weight: bold;
        }

        .nav-btn img { width: 32px; height: 32px; margin-bottom: 5px; opacity: 0.6; }
        .active-nav { color: var(--primary); }
        .active-nav img { opacity: 1; filter: drop-shadow(0 0 5px var(--primary)); }

        /* PROFILE MODAL (Профиль беті) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--card);
            width: 85%;
            padding: 30px;
            border-radius: 25px;
            border: 2px solid var(--primary);
            text-align: center;
        }

        .close-btn {
            margin-top: 20px;
            background: var(--primary);
            border: none; padding: 12px 25px;
            color: white; border-radius: 10px; font-weight: bold;
        }

        .action-btn {
            background: var(--primary);
            border: none; padding: 15px;
            width: 90%; border-radius: 15px;
            color: white; font-size: 18px; font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="profile-btn" onclick="openProfile()">👤 Профиль</div>
        <div class="xp-display">⚡ <span id="xp-count">0</span> XP</div>
    </div>

    <div id="page-main" class="page active">
        <img src="robot.webp" class="robot-img" alt="QANAT Robot">
        <h1 style="margin: 0; color: var(--primary);">QANAT</h1>
        <p style="color: #94a3b8; font-size: 18px;">Информатика Мастері</p>
        <button class="action-btn" onclick="tg.showAlert('Кейстер жақында қосылады!')">📦 Кейс ашу</button>
    </div>

    <div id="page-quiz" class="page">
        <h2>⚡ УБТ Куиз</h2>
        <p>Сұрақтар жүктелуде...</p>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <div style="font-size: 50px;">👨‍💻</div>
            <h2 id="user-name">Пайдаланушы</h2>
            <hr style="border: 0.5px solid #334155; margin: 20px 0;">
            <p>🏆 Лига: <b>Бронза</b></p>
            <p>🎯 Жалпы XP: <b id="profile-xp">0</b></p>
            <p>📏 Бойы: <b>190 см</b></p>
            <button class="close-btn" onclick="closeProfile()">Жабу</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn active-nav" onclick="showPage('main', this)">
            <img src="home.webp" alt="Home">
            <span>Басты</span>
        </div>
        <div class="nav-btn" onclick="showPage('quiz', this)">
            <img src="home.webp" style="filter: hue-rotate(180deg);" alt="Quiz">
            <span>Куиз</span>
        </div>
        <div class="nav-btn" onclick="tg.showAlert('Гардероб дайындалуда!')">
            <img src="home.webp" style="filter: grayscale(1);" alt="Wardrobe">
            <span>Гардероб</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let xp = localStorage.getItem('xp') ? parseInt(localStorage.getItem('xp')) : 0;
        document.getElementById('xp-count').innerText = xp;

        // Пайдаланушы атын Телеграмнан алу
        if (tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
        }

        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            el.classList.add('active-nav');
            
            tg.HapticFeedback.impactOccurred('medium');
        }

        function openProfile() {
            document.getElementById('profile-xp').innerText = xp;
            document.getElementById('profile-modal').style.display = 'flex';
            tg.HapticFeedback.impactOccurred('light');
        }

        function closeProfile() {
            document.getElementById('profile-modal').style.display = 'none';
        }

        // Тест үшін XP қосу (кейін алып тастауға болады)
        document.querySelector('.robot-img').onclick = () => {
            xp += 10;
            document.getElementById('xp-count').innerText = xp;
            localStorage.setItem('xp', xp);
            tg.HapticFeedback.impactOccurred('small');
        };
    </script>
</body>
</html>
