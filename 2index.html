<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QANAT App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: white; 
            font-family: sans-serif; 
            overflow: hidden; /* Экран секірмеуі үшін */
        }
        
        /* Top Bar */
        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            padding: 10px 15px; 
            background: var(--card); 
            border-bottom: 1px solid var(--primary); 
        }
        .xp-badge { background: var(--primary); padding: 5px 12px; border-radius: 10px; font-weight: bold; }
        .prof-btn { background: #334155; border: 1px solid var(--primary); color: white; padding: 5px 12px; border-radius: 10px; cursor: pointer; }

        /* Pages - Осы жерде биіктікті реттедік */
        .page { 
            display: none; 
            height: calc(100vh - 150px); /* Меню мен Topbar-дан қалған орын */
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; /* Басынан бастап тізу */
            padding-top: 10px;
            text-align: center; 
        }
        .active { display: flex; }

        /* Роботтың өлшемін кішірейттік, сонда батырма жоғары көтеріледі */
        .robot-img { 
            width: 180px; /* 250-ден 180-ге түсті */
            height: auto; 
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px var(--primary)); 
        }

        .action-btn {
            background: linear-gradient(45deg, var(--primary), #818cf8);
            border: none; 
            padding: 12px;
            width: 85%; 
            border-radius: 15px;
            color: white; 
            font-size: 16px; 
            font-weight: bold;
            margin-top: 5px;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }

        /* Bottom Nav */
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            height: 75px; 
            background: var(--card); 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            border-top: 1px solid #334155; 
            z-index: 10;
        }
        .nav-btn { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-weight: bold; font-size: 12px; }
        .nav-btn img { width: 28px; height: 28px; margin-bottom: 3px; }
        .active-nav { color: var(--primary); }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .modal-card { background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid var(--primary); width: 80%; text-align: center; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="prof-btn" onclick="openProfile()">👤 Профиль</button>
        <div class="xp-badge">⚡ <span id="xp-num">0</span> XP</div>
    </div>

    <div id="p-main" class="page active">
        <img src="robot.webp" class="robot-img">
        <h2 style="color: var(--primary); margin: 5px 0;">QANAT</h2>
        <p style="margin: 0 0 10px 0;">Деңгей: 1</p>
        <button class="action-btn" onclick="tg.showAlert('📦 Жақын арада кейстер ашылады!')">КЕЙС АШУ</button>
    </div>

    <div id="p-quiz" class="page">
        <h2>⚡ УБТ Куиз</h2>
        <p>Жақында қосылады...</p>
    </div>

    <div id="modal" class="modal">
        <div class="modal-card">
            <h2>Профиль</h2>
            <p>Аты: <b id="u-name">Маман</b></p>
            <p>Бойы: <b>190 см</b></p>
            <button onclick="closeProfile()" style="background: var(--primary); border: none; padding: 10px 20px; border-radius: 10px; color: white; font-weight: bold; margin-top: 15px;">Жабу</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn active-nav" onclick="nav('main', this)">
            <img src="home.webp">
            <span>Басты</span>
        </div>
        <div class="nav-btn" onclick="nav('quiz', this)">
            <img src="home.webp" style="filter: hue-rotate(180deg);">
            <span>Куиз</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let xp = localStorage.getItem('xp') || 0;
        document.getElementById('xp-num').innerText = xp;
        if(tg.initDataUnsafe.user) document.getElementById('u-name').innerText = tg.initDataUnsafe.user.first_name;

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            el.classList.add('active-nav');
            tg.HapticFeedback.impactOccurred('light');
        }

        function openProfile() { document.getElementById('modal').style.display = 'flex'; }
        function closeProfile() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
