<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сіз үшін</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Press Start 2P', cursive;
            touch-action: manipulation;
        }

        #matrixCanvas { position: fixed; top: 0; left: 0; z-index: 1; }

        #wish-container {
            position: fixed;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: 90%;
            max-width: 600px;
            background-color: rgba(255, 255, 255, 0.2);
            padding: 15px 10px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            display: none;
            backdrop-filter: blur(5px);
        }

        #wish-text {
            color: #fff;
            font-size: clamp(10px, 3.5vw, 16px);
            text-align: center;
            width: 100%;
            text-shadow: 0 0 10px #ff69b4;
            line-height: 1.6;
            transition: opacity 0.5s ease;
        }

        #overlay {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: clamp(18px, 6vw, 40px);
            z-index: 10;
            text-align: center;
            text-shadow: 0 0 15px #ff69b4;
            width: 90%;
        }

        #starfield {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            display: none;
            z-index: 0;
        }

        /* КІТАПТЫ ОРТАҒА КЕЛТІРУ */
        #book-container {
            position: fixed;
            top: 55%; /* Экранның ортасына жақын */
            left: 50%;
            transform: translate(-50%, -50%) scale(0.85); /* Бастапқы масштабы */
            display: none;
            z-index: 5;
            perspective: 2000px;
        }

        .book {
            width: 300px;
            height: 420px;
            position: relative;
            transform-style: preserve-3d;
        }

        .page {
            width: 100%; height: 100%;
            position: absolute;
            top: 0; left: 0;
            transform-origin: left center;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .front, .back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 2px 10px 10px 2px;
            overflow: hidden;
            background: #222;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .back { transform: rotateY(180deg); }

        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .flipped { transform: rotateY(-160deg); } /* Ашылғанда ортада жақсы көрінуі үшін бұрышы азайтылды */

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* МОБИЛЬДІ ҚҰРЫЛҒЫЛАРҒА АРНАЛҒАН ЖӨНДЕУ */
        @media (max-width: 600px) {
            #wish-container { top: 10%; }
            #wish-text { font-size: 12px; }
            #book-container { 
                top: 55%; 
                left: 90%;
                transform: translate(-50%, -50%) scale(0.65); /* Телефонда сыюы үшін кішірейтілді */
            }
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>
    <div id="starfield"></div>
    <div id="overlay"></div>

    <div id="wish-container">
        <div id="wish-text">Сізді келіп жеткен мерекеңізбен шын жүректен құттықтаймын!</div>
    </div>

    <div id="book-container">
        <div class="book">
            <div class="page" style="z-index: 1;">
                <div class="front"><img src="ani10.jfif" alt="6"></div>
            </div>
            <div class="page" id="p5" onclick="flipPage(this, 4)" style="z-index: 2;">
                <div class="front"><img src="ani2.jfif" alt="5"></div>
                <div class="back"><img src="ani9.jfif" alt="5-back"></div>
            </div>
            <div class="page" id="p4" onclick="flipPage(this, 3)" style="z-index: 3;">
                <div class="front"><img src="ani8.jfif" alt="4"></div>
                <div class="back"><img src="ani7.jfif" alt="4-back"></div>
            </div>
            <div class="page" id="p3" onclick="flipPage(this, 2)" style="z-index: 4;">
                <div class="front"><img src="ani6.jfif" alt="3"></div>
                <div class="back"><img src="ani5.jfif" alt="3-back"></div>
            </div>
            <div class="page" id="p2" onclick="flipPage(this, 1)" style="z-index: 5;">
                <div class="front"><img src="ani4.jfif" alt="2"></div>
                <div class="back"><img src="ani3.jfif" alt="2-back"></div>
            </div>
            <div class="page" id="p1" onclick="flipPage(this, 0)" style="z-index: 6;">
                <div class="front"><img src="8march1.jpg" alt="1"></div>
                <div class="back"><img src="ani1.jfif" alt="1-back"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const wishContainer = document.getElementById('wish-container');
        const wishText = document.getElementById('wish-text');
        const starfield = document.getElementById('starfield');
        const bookContainer = document.getElementById('book-container');

        const wishes = [
            "Бүгінгі күн сізге тек күлкі сыйласын! ✨",
            "Сіз әлемдегі ең сұлу жансыз! 🌸",
            "Жүрегіңіз мәңгі бақытқа толсын! 💖",
            "Әрбір сәтіңіз сиқырлы болсын! 🌟",
            "Арман-мақсаттарыңа жете беріңіз! 🚀",
            "Бақытты болыңыз!! ❤️"
        ];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff69b4"; 
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = Math.floor(Math.random() * 10);
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        let matrixInterval = setInterval(drawMatrix, 40);
        const sequence = ["3", "2", "1", "Сізді мерекеңізбен құттықтаймын Акниет әпке"];
        let seqIndex = 0;

        function runSequence() {
            if (seqIndex < sequence.length) {
                overlay.innerText = sequence[seqIndex];
                overlay.style.opacity = 0;
                setTimeout(() => overlay.style.opacity = 1, 100);
                seqIndex++;
                setTimeout(runSequence, 1500); // Сәл ұзағырақ көрсету үшін
            } else {
                startSpacePhase();
            }
        }

        function startSpacePhase() {
            clearInterval(matrixInterval);
            canvas.style.transition = "opacity 1s";
            canvas.style.opacity = "0";
            setTimeout(() => {
                overlay.style.display = "none";
                canvas.style.display = 'none';
                starfield.style.display = 'block';
                bookContainer.style.display = 'block';
                wishContainer.style.display = 'block';
                createTwinklingStars();
            }, 1000);
        }

        function flipPage(element, index) {
            const isFlipped = element.classList.toggle('flipped');
            if (isFlipped) {
                setTimeout(() => { element.style.zIndex = index; }, 500);
            } else {
                element.style.zIndex = 6 - index;
            }

            wishText.style.opacity = 0;
            setTimeout(() => {
                wishText.innerText = wishes[index + 1] || wishes[wishes.length - 1];
                wishText.style.opacity = 1;
            }, 300);
        }

        function createTwinklingStars() {
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.setProperty('--duration', (2 + Math.random() * 3) + 's');
                starfield.appendChild(star);
            }
        }

        setTimeout(runSequence, 500);

        // Экран өлшемі өзгергенде канвасты реттеу
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
