<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QANAT App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --gold: #fbbf24; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        .top-bar { display: flex; justify-content: space-between; padding: 10px 15px; background: var(--card); border-bottom: 2px solid var(--primary); position: fixed; top:0; width:100%; z-index:10; box-sizing: border-box; }
        .xp-badge { background: var(--primary); padding: 5px 12px; border-radius: 10px; font-weight: bold; }

        .page { display: none; height: 100vh; padding: 70px 20px 100px 20px; overflow-y: auto; flex-direction: column; align-items: center; box-sizing: border-box; }
        .active { display: flex; }

        .robot-img { width: 200px; height: auto; margin: 20px 0; filter: drop-shadow(0 0 15px var(--primary)); transition: 0.3s; }
        .robot-img:active { transform: scale(0.95); }

        .action-btn { background: linear-gradient(45deg, var(--primary), #818cf8); border: none; padding: 15px; width: 90%; border-radius: 15px; color: white; font-size: 16px; font-weight: bold; margin-top: 10px; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; color: #94a3b8; font-size: 12px; opacity: 0.6; }
        .active-nav { opacity: 1; color: var(--primary); }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; }
        .modal-card { background: var(--card); padding: 25px; border-radius: 20px; border: 2px solid var(--primary); width: 80%; text-align: center; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button onclick="openProfile()" style="background:#334155; color:white; border:1px solid var(--primary); border-radius:8px; padding:5px 10px;">👤 Профиль</button>
        <div class="xp-badge">⚡ <span id="xp-num">0</span> XP</div>
    </div>

    <div id="p-main" class="page active">
        <img src="default.webp" id="robot-display" class="robot-img" onclick="clickRobot()">
        <h2 id="u-league" style="color: var(--gold); margin: 5px 0;">Bronze League</h2>
        <button class="action-btn" onclick="tg.showAlert('Кейстер жақында!')">КЕЙС АШУ</button>
        <div style="height: 50px;"></div>
    </div>

    <div id="p-quiz" class="page">
        <h2>УБТ КУИЗ</h2>
        <p>Сұрақтар жүктелуде...</p>
    </div>

    <div id="p-ward" class="page">
        <h2>ГАРДЕРОБ</h2>
        <div id="inventory-list"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn active-nav" onclick="nav('main', this)"><span>🏠 Басты</span></div>
        <div class="nav-btn" onclick="nav('quiz', this)"><span>📝 Куиз</span></div>
        <div class="nav-btn" onclick="nav('ward', this)"><span>👕 Гардероб</span></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-card">
            <h2>Профиль</h2>
            <p>Аты: <b id="u-name">...</b></p>
            <p>Лига: <b id="m-league">Bronze</b></p>
            <p>Бойы: <b>190 см</b></p>
            <button onclick="closeProfile()" class="action-btn">Жабу</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- SUPABASE БАПТАУ ---
        const SB_URL = 'https://ipkxmxjvvirndgbzbowi.supabase.co';
        const SB_KEY = 'sb_publishable_cgwUcDZrDKwQheka0GZx7g_VyuCEOnb'; // ОСЫ ЖЕРГЕ ANON KEY ҚОЙ!
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        let userStats = { xp: 0, league: 'Bronze', skin: 'default', inventory: ['default'] };

        // 1. Деректерді базадан жүктеу
        async function loadUser() {
            const user = tg.initDataUnsafe.user;
            if (!user) return;

            document.getElementById('u-name').innerText = user.first_name;

            let { data, error } = await supabase.from('users').select('*').eq('id', user.id).single();

            if (data) {
                userStats = data;
            } else {
                // Жаңа қолданушы болса базаға қосамыз
                const { error: insErr } = await supabase.from('users').insert([{
                    id: user.id, username: user.first_name, xp: 0, league: 'Bronze', skin: 'default', inventory: ['default']
                }]);
            }
            updateUI();
        }

        // 2. Деректерді базаға сақтау
        async function saveToDB() {
            const user = tg.initDataUnsafe.user;
            if (!user) return;
            await supabase.from('users').update({
                xp: userStats.xp, league: userStats.league, skin: userStats.skin, inventory: userStats.inventory
            }).eq('id', user.id);
        }

        function updateUI() {
            document.getElementById('xp-num').innerText = userStats.xp;
            document.getElementById('u-league').innerText = userStats.league + " League";
            document.getElementById('m-league').innerText = userStats.league;
            document.getElementById('robot-display').src = userStats.skin + ".webp";
        }

        function clickRobot() {
            userStats.xp += 5;
            // Лиғаны тексеру
            if(userStats.xp > 1000) userStats.league = 'Silver';
            if(userStats.xp > 5000) userStats.league = 'Gold';
            
            updateUI();
            saveToDB(); // Әр шерткенде базаға сақтайды
            tg.HapticFeedback.impactOccurred('light');
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            el.classList.add('active-nav');
        }

        function openProfile() { document.getElementById('modal').style.display = 'flex'; }
        function closeProfile() { document.getElementById('modal').style.display = 'none'; }

        loadUser(); // Ботты ашқанда деректерді жүктейді
    </script>
</body>
</html>
